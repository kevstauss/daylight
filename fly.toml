# Daylight — Fly.io config. One machine runs the web read-path + the in-process daily
# Ledger scheduler, sharing one SQLite volume (avoids Fly's one-machine-per-volume limit).
#
# First-time setup (Kevin runs these — they need your Fly auth):
#   fly apps create daylight
#   fly volumes create daylight_data --region iad --size 1
#   fly deploy
# Then set the real public URL:  fly secrets set DAYLIGHT_SITE_URL=https://<app>.fly.dev

app = "daylight"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DAYLIGHT_DB_PATH = "/data/daylight.db"
  DAYLIGHT_SITE_URL = "https://daylight.fly.dev"
  DAYLIGHT_LEDGER_CRON = "17 0 * * *"
  # Ledger increments — live as of v0.2.
  FLAG_LEDGER_REGISTRY = "1"
  FLAG_LEDGER_FEED = "1"
  FLAG_LEDGER_HEURISTICS = "1"
  # Lookout (Phase 2) UI is live; enable the crt.sh backfill cron by setting
  # DAYLIGHT_LOOKOUT_CRON (e.g. "40 1 * * *"). Left unset so the first backfill is manual
  # (`pnpm --filter @daylight/lookout backfill`) — crt.sh is flaky; watch the first run.
  FLAG_LOOKOUT = "1"
  # Floodlight (Phase 3): analysis engine is live; the /floodlight UI shows scorecards once
  # the live page-capture scanner is enabled (pending a scheduler/host decision).
  FLAG_FLOODLIGHT = "1"

[[mounts]]
  source = "daylight_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine always running so the in-process daily cron actually fires.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/status"
