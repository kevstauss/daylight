# Daylight — Fly.io config. One machine runs the web read-path + the in-process daily
# Ledger scheduler, sharing one SQLite volume (avoids Fly's one-machine-per-volume limit).
#
# First-time setup (Kevin runs these — they need your Fly auth):
#   fly volumes create daylight_data --region iad --size 1 -a daylight-watchdog
#   fly deploy
# The app (daylight-watchdog) already exists. DAYLIGHT_SITE_URL below matches its .fly.dev
# hostname; change it here (and redeploy) if you attach a custom domain.

app = "daylight-watchdog"
primary_region = "iad"

# 512MB swap: pure OOM insurance for the browser-heavy Floodlight sweep. A transient memory
# spike swaps to disk instead of getting OOM-killed mid-sweep. Slower under pressure, but a
# batch sweep tolerates that; staying alive is what matters.
swap_size_mb = 512

[build]
  dockerfile = "Dockerfile"

[env]
  DAYLIGHT_DB_PATH = "/data/daylight.db"
  DAYLIGHT_SITE_URL = "https://daylight.watch"
  DAYLIGHT_CONTACT = "contact@daylight.watch"
  # Scheduled sweeps (UTC), staggered to spread load on the single machine:
  DAYLIGHT_LEDGER_CRON = "17 0 * * *"      # daily 00:17 — CISA registry updates ~daily
  DAYLIGHT_LOOKOUT_CRON = "40 1 * * *"     # daily 01:40 — new certs/subdomains appear continuously
  DAYLIGHT_FLOODLIGHT_CRON = "0 3 * * 1"   # weekly Mon 03:00 — tracker setups change slowly (browser-heavy)
  DAYLIGHT_RECEIPTS_CRON = "0 4 * * 1,4"   # Mon+Thu 04:00 — takedowns are time-sensitive, so 2x/week
  DAYLIGHT_REDTAPE_CRON = "0 5 * * 1,4"    # Mon+Thu 05:00 — after Floodlight; idempotent + re-checks published gaps
  # Ledger increments — live as of v0.2.
  FLAG_LEDGER_REGISTRY = "1"
  FLAG_LEDGER_FEED = "1"
  FLAG_LEDGER_HEURISTICS = "1"
  # Lookout (Phase 2) UI is live; enable the crt.sh backfill cron by setting
  # DAYLIGHT_LOOKOUT_CRON (e.g. "40 1 * * *"). Left unset so the first backfill is manual
  # (`pnpm --filter @daylight/lookout backfill`) — crt.sh is flaky; watch the first run.
  FLAG_LOOKOUT = "1"
  # Floodlight (Phase 3): analysis engine + live page-capture scanner. The scan box is
  # restricted to federal .gov hosts (isGovHost), which bounds the SSRF surface without a
  # network egress filter. Needs the browser in the image (Dockerfile) + a ~2GB machine.
  FLAG_FLOODLIGHT = "1"
  FLAG_FLOODLIGHT_SCAN = "1"
  # Receipts (Phase 4): live snapshot capture + removal ledger are wired and run via
  # DAYLIGHT_RECEIPTS_CRON. DAYLIGHT_WAYBACK pushes each snapshot to the Internet Archive
  # (Wayback SPN2) so a removed tracker/clause/seal keeps a tamper-evident third-party copy;
  # it's opt-in because it's an external, rate-limited call.
  FLAG_RECEIPTS = "1"
  DAYLIGHT_WAYBACK = "1"
  # Redtape (Phase 5): gap-finder + human gate are live. The public /redtape list only ever
  # shows human-reviewed + published rows (gate enforced in the DB layer). Wiring the AI
  # researcher needs ANTHROPIC_API_KEY + DAYLIGHT_REDTAPE_MODEL and a review workflow.
  FLAG_REDTAPE = "1"
  # First-party, aggregate-only analytics shown on /privacy. Records a per-day count per route +
  # coarse referrer class (with the .gov apex when a federal site links in). Stores NO IP / user-
  # agent / cookie / session — the /privacy page publishes the exact retained schema. Unset in dev
  # (see .env.example) so `pnpm dev` doesn't write. Honors Do-Not-Track and skips prefetches.
  FLAG_ANALYTICS = "1"
  # Keep the operator's own visits out of the counts (they'd inflate a low-traffic launch). Exact
  # IPs or trailing-dot/colon prefixes, comma/space-separated. The IP is read transiently to skip
  # recording and never stored (see /privacy). Set your own IP here (or via `fly secrets set`),
  # then redeploy. To clear already-inflated data: `fly ssh console -C "pnpm analytics:reset --yes"`.
  # DAYLIGHT_ANALYTICS_EXCLUDE_IPS = "203.0.113.7"
  # Bots/crawlers/AI assistants (incl. Claude Code, whose UA carries "claude"/"anthropic") are
  # dropped from the counts by a built-in User-Agent list — no config needed. The UA is read
  # transiently and never stored. Add extra substrings here (appended to the built-ins) if a bot
  # slips through; generic HTTP tools are intentionally not built in so real API/feed pulls count.
  # DAYLIGHT_ANALYTICS_EXCLUDE_UA = "somebot, anotherbot"

[[vm]]
  # shared-cpu-2x / 2GB: the Next.js read-path + in-process crons + headless Chromium capture.
  # A fractional CPU (shared-cpu-1x) makes big-site captures drag and time out; 2 vCPUs let them
  # complete. (Scale down to shared-cpu-1x if live capture is ever disabled.)
  size = "shared-cpu-2x"
  memory = "2gb"

[[mounts]]
  source = "daylight_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine always running so the in-process daily cron actually fires.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/status"
