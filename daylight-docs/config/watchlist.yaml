# Daylight watchlist — drives every module.
# Seed values VERIFIED against live data 2026-07-01 (CISA dotgov-data + crt.sh CT logs).
# Existence-only: NEVER authenticate past any gated host listed here.

apex_domains:                 # Ledger watches ownership; Lookout watches their certs
  - ndstudio.gov
  - passports.gov
  - trumprx.gov
  - realfood.gov
  - trumpaccounts.gov         # note: owned by Dept. of the Treasury (not White House)
  - usadf.gov                 # security contact is akash@ndstudio.gov (verified) -> H1 flag
  - freedom.gov
  - login.gov
  - eac.gov

subdomain_apexes:             # Lookout also enumerates certs under these (subdomain-hosted programs)
  - energy.gov                # for genesis.energy.gov

comparators:                  # legit original -> for shadow-vs-real diffs (Floodlight / Receipts)
  vote.gov: eac.gov
  passports.gov: travel.state.gov
  login: login.gov

person_watch:                 # Ledger fires (high) when these appear as any contact
  - "@ndstudio.gov"

org_watch:                    # Ledger fires on new/changed domains for these Organization names
  - "Executive Office of the President"

suborg_watch:                 # ...and these Suborganization names (both are real in the live data)
  - "Department of Government Efficiency"
  - "White House Office"

# Ledger H1 (contact-domain mismatch): a security-contact email whose domain is neither the
# apex itself nor in this allowlist of recognized central mailboxes is flagged. Escalate hardest
# when the contact domain is itself a product .gov (e.g. ndstudio.gov).
central_security_allowlist:
  - eop.gov
  - omb.eop.gov
  - gsa.gov
  - cisa.gov
  - hq.dhs.gov

# Lookout subdomain-flag scoring (labels left of the apex)
subdomain_flags:
  high:    [previews, staging, sandbox, auth, photo, photos, internal, infra, analytics, inference, upload, admin]
  notable: [api, cms, cdn, assets, onboarding, hiring, prod, int]

# Real subdomains seen in CT logs (existence-only fixtures; verified 2026-07-01).
# NOTE: many sit behind a *.cloudflareaccess.com gate — observe existence, never authenticate.
known_subdomains_seen:
  - previews.ndstudio.gov
  - passports.staging.ndstudio.gov
  - passport.staging.ndstudio.gov
  - freedom.previews.ndstudio.gov
  - analytics.infra.ndstudio.gov      # AutoMonitor endpoint (from reporting; visible in CT)
  - cdn.infra.ndstudio.gov            # AutoMonitor script host
  - inference.ndstudio.gov
  - genesis.assets.ndstudio.gov
  - cms.ndstudio.gov
  - admin.ndstudio.gov
  - vote-gov.previews.ndstudio.gov    # documented by reporting; previews.* pattern confirmed live
